<c-container fluid>
  <c-row>
    <c-col xs="12">
      <c-card>
        <c-card-header>
          <strong>Mis Aplicaciones</strong>
        </c-card-header>
        <c-card-body>
          <ul>
            <li *ngFor="let app of aplicaciones">
              <a [routerLink]="app.ruta">{{ app.nombre }}</a>
            </li>
          </ul>
        </c-card-body>
      </c-card>
    </c-col>
  </c-row>
</c-container>
